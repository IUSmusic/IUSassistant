<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>I/US Music Assistant Songwriter</title>
    <meta name="description" content="Official-style music improvisation preview with MIDI input, theory-guided continuation, MusicVAE selection, SoundFont playback, and clip arrangement." />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="shell">
      <header class="topbar">
        <div class="brand">
          <img src="./assets/logo.png" alt="I/US Music Assistant Songwriter logo" class="logo" />
          <div class="brand-copy">
            <div class="kicker">Official</div>
            <h1>I/US Music Assistant Songwriter</h1>
          </div>
        </div>
        <div class="topbar-controls">
          <label class="theme-select compact-field">
            <span>Theme</span>
            <select id="themeSelect">
              <option value="dark" selected>Dark</option>
              <option value="contrast">High Contrast</option>
            </select>
          </label>
          <button id="startAudioBtn" class="btn btn-solid">✦ Audio</button>
          <button id="connectMidiBtn" class="btn">⌘ MIDI</button>
        </div>
      </header>

      <main class="workspace">
        <aside class="sidebar panel">
          <div class="section-head">
            <h2>Controls</h2>
            <div id="statusPill" class="status">Idle</div>
          </div>

          <div class="controls-grid">
            <label>
              <span>Root</span>
              <select id="rootSelect">
                <option value="C">C</option><option value="C#">C♯</option><option value="D">D</option><option value="D#">D♯</option>
                <option value="E">E</option><option value="F">F</option><option value="F#">F♯</option><option value="G">G</option>
                <option value="G#">G♯</option><option value="A">A</option><option value="A#">A♯</option><option value="B">B</option>
              </select>
            </label>
            <label>
              <span>Scale</span>
              <select id="scaleSelect">
                <option value="major">Major</option><option value="minor">Minor</option><option value="dorian">Dorian</option>
                <option value="mixolydian">Mixolydian</option><option value="blues">Blues</option><option value="pentatonic">Pentatonic</option>
              </select>
            </label>
            <label>
              <span>Engine</span>
              <select id="engineSelect">
                <option value="theory">Theory Engine</option>
                <option value="musicvae-2bar">MusicVAE · 2 Bar</option>
                <option value="musicvae-4bar">MusicVAE · 4 Bar</option>
              </select>
            </label>
            <label>
              <span>Playback</span>
              <select id="playbackSelect">
                <option value="soundfont">SoundFont</option>
                <option value="synth">Synth</option>
              </select>
            </label>
            <label>
              <span>Style</span>
              <select id="styleSelect">
                <option value="balanced">Balanced</option><option value="arpeggio">Arpeggio</option>
                <option value="jazzy">Jazzy</option><option value="ambient">Ambient</option>
              </select>
            </label>
            <label>
              <span>Step</span>
              <select id="stepSelect">
                <option value="0.25">0.25 beat</option><option value="0.5">0.5 beat</option><option value="0.75">0.75 beat</option>
                <option value="1">1 beat</option><option value="1.5" selected>1.5 beats</option><option value="2">2 beats</option>
                <option value="3">3 beats</option><option value="4">4 beats</option><option value="6">6 beats</option>
                <option value="8">8 beats</option><option value="adaptive">Adaptive</option>
              </select>
            </label>
            <label>
              <span>Progression</span>
              <select id="progressionSelect">
                <option value="I-IV-V-I">I · IV · V · I</option><option value="ii-V-I-vi">ii · V · I · vi</option>
                <option value="i-VI-III-VII">i · VI · III · VII</option><option value="I-vi-IV-V">I · vi · IV · V</option>
              </select>
            </label>
            <label>
              <span>Length</span>
              <select id="barsSelect">
                <option value="2">2 bars</option><option value="4" selected>4 bars</option><option value="8">8 bars</option>
              </select>
            </label>
            <label>
              <span>BPM</span>
              <input id="bpmInput" type="number" min="40" max="220" step="1" value="110" />
            </label>
            <label class="span-2">
              <span>Freedom</span>
              <input id="temperatureRange" type="range" min="0" max="100" value="42" />
            </label>
          </div>

          <div class="button-row block-row">
            <button id="seedDemoBtn" class="btn">◇ Demo</button>
            <button id="clearBtn" class="btn">– Clear</button>
            <button id="generateBtn" class="btn btn-solid">◆ Generate Clip</button>
          </div>

          <div class="subpanel">
            <div class="section-head small-head">
              <h3>Seed Input</h3>
              <div id="midiPill" class="status">MIDI off</div>
            </div>
            <div id="keyboard" class="keyboard" aria-label="On-screen piano keyboard"></div>
            <div class="button-row compact">
              <button id="playSeedBtn" class="btn">▷ Seed</button>
              <button id="exportMidiBtn" class="btn btn-solid">⬇ MIDI</button>
            </div>
            <div id="seedList" class="seed-list"></div>
          </div>
        </aside>

        <section class="content">
          <div class="transport panel">
            <div class="transport-stats">
              <div><span>Seed</span><strong id="capturedCount">0</strong></div>
              <div><span>Clips</span><strong id="generatedCount">0</strong></div>
              <div><span>Mode</span><strong id="modeReadout">Theory</strong></div>
              <div><span>Scale</span><strong id="scaleReadout">C major</strong></div>
            </div>
            <div class="button-row compact transport-actions">
              <button id="playArrangementBtn" class="btn btn-solid">▶ Arrangement</button>
              <button id="clearArrangementBtn" class="btn">⌫ Arrangement</button>
            </div>
          </div>

          <section class="panel results-panel">
            <div class="section-head">
              <h2>Results</h2>
              <div class="status">Click to play · drag to track</div>
            </div>
            <div id="resultsList" class="results-list"></div>
          </section>

          <section class="panel arranger-panel bottom-arranger">
            <div class="section-head">
              <h2>Arrangement</h2>
              <div class="status">Bottom timeline · 2 tracks · 8 bars</div>
            </div>
            <div id="arrangementGrid" class="arrangement-grid"></div>
          </section>
        </section>
      </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/soundfont-player@0.15.7/dist/soundfont-player.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@magenta/music@1.23.1"></script>
    <script src="./app.js"></script>
  </body>
</html>
