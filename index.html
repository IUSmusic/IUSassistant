<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>I/US Music Assistant Songwriter</title>
    <meta name="description" content="Minimalist music improvisation preview with MIDI, theory-guided continuation, optional Magenta MusicVAE, and SoundFont playback." />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="shell">
      <header class="topbar">
        <div class="brand">
          <img src="./assets/logo.png" alt="I/US Music Assistant Songwriter logo" class="logo" />
          <div>
            <div class="kicker">Official</div>
            <h1>I/US Music Assistant Songwriter</h1>
          </div>
        </div>
        <div class="actions">
          <button id="startAudioBtn" class="btn btn-solid">✦ Enable Audio</button>
          <button id="connectMidiBtn" class="btn">⌘ Connect MIDI</button>
        </div>
      </header>

      <main class="layout">
        <section class="panel controls">
          <div class="panel-head">
            <h2>Control</h2>
            <div id="statusPill" class="status">Idle</div>
          </div>

          <div class="form-grid">
            <label>
              Root
              <select id="rootSelect">
                <option value="C">C</option>
                <option value="C#">C♯</option>
                <option value="D">D</option>
                <option value="D#">D♯</option>
                <option value="E">E</option>
                <option value="F">F</option>
                <option value="F#">F♯</option>
                <option value="G">G</option>
                <option value="G#">G♯</option>
                <option value="A">A</option>
                <option value="A#">A♯</option>
                <option value="B">B</option>
              </select>
            </label>

            <label>
              Scale
              <select id="scaleSelect">
                <option value="major">Major</option>
                <option value="minor">Minor</option>
                <option value="dorian">Dorian</option>
                <option value="mixolydian">Mixolydian</option>
                <option value="blues">Blues</option>
                <option value="pentatonic">Pentatonic</option>
              </select>
            </label>

            <label>
              Engine
              <select id="engineSelect">
                <option value="theory">Theory Engine</option>
                <option value="musicvae-2bar">MusicVAE 2-Bar</option>
                <option value="musicvae-4bar">MusicVAE 4-Bar</option>
              </select>
            </label>

            <label>
              Playback
              <select id="playbackSelect">
                <option value="soundfont">SoundFont</option>
                <option value="synth">Synth Fallback</option>
              </select>
            </label>

            <label>
              Style
              <select id="styleSelect">
                <option value="balanced">Balanced</option>
                <option value="arpeggio">Arpeggio</option>
                <option value="jazzy">Jazzy</option>
                <option value="ambient">Ambient</option>
              </select>
            </label>

            <label>
              Step
              <select id="stepSelect">
                <option value="4">4 beats</option>
                <option value="3">3 beats</option>
                <option value="1.5">1.5 beats</option>
              </select>
            </label>

            <label>
              Progression
              <select id="progressionSelect">
                <option value="I-IV-V-I">I · IV · V · I</option>
                <option value="ii-V-I-vi">ii · V · I · vi</option>
                <option value="i-VI-III-VII">i · VI · III · VII</option>
                <option value="I-vi-IV-V">I · vi · IV · V</option>
              </select>
            </label>

            <label>
              Length
              <select id="barsSelect">
                <option value="2">2 bars</option>
                <option value="4" selected>4 bars</option>
                <option value="8">8 bars</option>
              </select>
            </label>

            <label class="wide">
              Freedom
              <input id="temperatureRange" type="range" min="0" max="100" value="42" />
            </label>
          </div>

          <div class="button-row">
            <button id="seedDemoBtn" class="btn">◇ Demo</button>
            <button id="clearBtn" class="btn">– Clear</button>
            <button id="generateBtn" class="btn btn-solid">◆ Generate</button>
          </div>
        </section>

        <section class="panel keyboard-panel">
          <div class="panel-head">
            <h2>Input</h2>
            <div id="midiPill" class="status">MIDI off</div>
          </div>
          <div id="keyboard" class="keyboard"></div>
          <div class="button-row">
            <button id="playSeedBtn" class="btn">▷ Seed</button>
            <button id="playAllBtn" class="btn">▶ Result</button>
            <button id="exportMidiBtn" class="btn btn-solid">⬇ MIDI</button>
          </div>
        </section>

        <section class="panel output-panel">
          <div class="stats">
            <div><span>Seed</span><strong id="capturedCount">0</strong></div>
            <div><span>Generated</span><strong id="generatedCount">0</strong></div>
            <div><span>Mode</span><strong id="modeReadout">Theory</strong></div>
            <div><span>Scale</span><strong id="scaleReadout">C major</strong></div>
          </div>
          <div id="timeline" class="timeline"></div>
        </section>
      </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/soundfont-player@0.15.7/dist/soundfont-player.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@magenta/music@1.23.1/es6/core.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@magenta/music@1.23.1/es6/music_vae.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
